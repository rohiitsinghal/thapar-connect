name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'Frontend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Create env file
        run: echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env.production
      - run: npm ci
      - run: npm run lint || true
      - run: npm run test
      - run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Create env file
        working-directory: Frontend
        run: echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env.production
      - name: Install and build
        working-directory: Frontend
        run: |
          npm ci
          npm run build
      - name: Deploy dist/ to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "Frontend/dist/*"
          target: "/home/ubuntu/thapar-connect/Frontend/dist_new"
          strip_components: 2
      - name: Swap in new build atomically
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/thapar-connect/Frontend
            rm -rf dist_old
            mv dist dist_old
            mv dist_new dist
            sudo chmod o+rX -R dist
