<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timetable Lookup</title>
<style>
  :root {
    --border: #ddd;
    --bg-row-alt: #fafafa;
    --text-dim: #777;
    --lecture: #2e7d32;
    --tutorial: #6a1b9a;
    --practical: #b8860b;
    --accent: #1a73e8;
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0;
    padding: 24px;
    color: #1a1a1a;
    background: #fff;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  h1 {
    font-size: 26px;
    margin: 0;
  }

  .search-box {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .search-box input {
    font-size: 15px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 220px;
  }

  .search-box button {
    font-size: 15px;
    padding: 8px 16px;
    border: 1px solid var(--accent);
    background: #fff;
    color: var(--accent);
    border-radius: 6px;
    cursor: pointer;
  }

  .search-box button:hover {
    background: var(--accent);
    color: #fff;
  }

  #student-info {
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--text-dim);
  }

  #student-info strong {
    color: #1a1a1a;
  }

  #message {
    padding: 12px 16px;
    border-radius: 6px;
    background: #fdecea;
    color: #b71c1c;
    margin-bottom: 16px;
    display: none;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  th {
    text-align: left;
    font-size: 14px;
    padding: 10px 8px;
    border-bottom: 2px solid #1a1a1a;
  }

  th.time-col {
    width: 80px;
  }

  td {
    border: 1px solid var(--border);
    vertical-align: top;
    padding: 0;
    height: 90px;
  }

  td.time-cell {
    border: none;
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
    padding: 6px 8px 0 0;
    vertical-align: top;
  }

  tr:nth-child(odd) td.empty-slot {
    background: var(--bg-row-alt);
  }

  .slot-box {
    height: 100%;
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    overflow: hidden;
  }

  .slot-type {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    color: #fff;
    padding: 2px 6px;
    border-radius: 3px;
    width: fit-content;
  }

  .slot-type.lecture   { background: var(--lecture); }
  .slot-type.tutorial  { background: var(--tutorial); }
  .slot-type.practical { background: var(--practical); }

  .slot-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1.25;
  }

  .slot-meta {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.3;
  }

  .slot-meta .room {
    font-weight: 600;
    color: #333;
  }

  footer {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-dim);
  }

  @media (max-width: 800px) {
    table, thead, tbody, th, td, tr { display: block; }
    th.time-col { display: none; }
    td.time-cell { display: none; }
    th { border-bottom: 1px solid var(--border); }
    td { height: auto; min-height: 40px; }
    .slot-box { padding: 8px; }
  }
</style>
</head>
<body>

<header>
  <h1>Time Table</h1>
  <div class="search-box">
    <input id="roll-input" type="text" placeholder="Enter roll number" autocomplete="off">
    <button id="search-btn">Search</button>
  </div>
</header>

<div id="message"></div>
<div id="student-info"></div>

<div id="table-wrap"></div>

<footer>Data loaded from timetable.json</footer>

<script>
let TIMETABLE = null;

async function loadData() {
  try {
    const res = await fetch('output/timetable.json');
    TIMETABLE = await res.json();
  } catch (err) {
    showMessage('Could not load timetable.json — make sure it is in the same folder as this file.');
  }
}

function showMessage(text) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.style.display = text ? 'block' : 'none';
}

function buildEmptyGrid(days, timeslots) {     
  // group timeslots by day, ordered as they appear in meta.timeslots
  const byDay = {};
  days.forEach(d => byDay[d] = []);
  timeslots.forEach(s => byDay[s.day].push(s));
  return byDay;
}

function renderTimetable(student) {
  const meta = TIMETABLE.meta;
  const days = meta.days;
  const byDay = buildEmptyGrid(days, meta.timeslots);

  // index classes by (day, slot_index) for this student
  const classByDaySlot = {};
  student.classes.forEach(c => {
    const key = c.day + '|' + c.slot_index;
    classByDaySlot[key] = c;
  });

  // also mark the slot AFTER a practical's start as "occupied" so we don't
  // render an empty box on top of the second half of a 2-slot practical
  const occupiedNext = new Set();
  student.classes.forEach(c => {
    if (c.slots === 2) {
      occupiedNext.add(c.day + '|' + (c.slot_index + 1));
    }
  });

  const slotsPerDay = byDay[days[0]].length;

  let html = '<table><thead><tr><th class="time-col">Time</th>';
  days.forEach(d => html += `<th>${d}</th>`);
  html += '</tr></thead><tbody>';

  for (let row = 0; row < slotsPerDay; row++) {
    const slot = byDay[days[0]][row];
    html += `<tr><td class="time-cell">${slot.start}</td>`;

    days.forEach(day => {
      const daySlot = byDay[day][row];
      const key = day + '|' + daySlot.slot_index;

      if (occupiedNext.has(key)) {
        // second half of a 2-slot practical — already rendered with
        // rowspan="2" on the previous row, so emit nothing here
        return;
      }

      const cls = classByDaySlot[key];
      if (!cls) {
        html += `<td class="empty-slot"></td>`;
      } else {
        const rowspan = cls.slots === 2 ? ' rowspan="2"' : '';
        html += `<td${rowspan}>
          <div class="slot-box">
            <span class="slot-type ${cls.type}">${cls.type}</span>
            <div class="slot-title">${escapeHtml(cls.title)}</div>
            <div class="slot-meta"><span class="room">${escapeHtml(cls.room_id)}</span></div>
            <div class="slot-meta">${escapeHtml(cls.course_code)} &middot; ${escapeHtml(cls.teacher)}</div>
          </div>
        </td>`;
      }
    });

    html += '</tr>';
  }

  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}

function escapeHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function search() {
  showMessage('');
  const roll = document.getElementById('roll-input').value.trim();
  if (!roll) {
    showMessage('Please enter a roll number.');
    return;
  }
  if (!TIMETABLE) {
    showMessage('Timetable data not loaded yet.');
    return;
  }

  const student = TIMETABLE.by_student[roll];
  if (!student) {
    showMessage(`No student found with roll number "${roll}".`);
    document.getElementById('student-info').innerHTML = '';
    document.getElementById('table-wrap').innerHTML = '';
    return;
  }

  document.getElementById('student-info').innerHTML =
    `<strong>${escapeHtml(student.name)}</strong> &middot; ${escapeHtml(roll)} &middot; ` +
    `Semester ${escapeHtml(student.semester)} &middot; ${escapeHtml(student.major)}` +
    (student.minor ? ` + ${escapeHtml(student.minor)}` : '');

  renderTimetable(student);
}

document.getElementById('search-btn').addEventListener('click', search);
document.getElementById('roll-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});

loadData();
</script>

</body>
</html>
